{% extends 'core/base.html' %}
{% load static %}

{% block content %}
  <style>
    .review-page {
      min-height: 100vh;
      background: #151f32;
      padding: 40px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    
    .review-card {
      width: 100%;
      max-width: 600px;
      background: #111625;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 30px;
      color: white;
    }
    
    .review-card h1 {
      font-size: 26px;
      margin-bottom: 5px;
    }
    
    .review-card p {
      color: #94a3b8;
      margin-bottom: 20px;
    }
    
    .star-rating {
      display: flex;
      gap: 10px;
      font-size: 28px;
      margin-bottom: 20px;
      cursor: pointer;
    }
    
    .star-rating i {
      color: #2c344a;
      transition: 0.2s;
    }
    
    .star-rating i.active {
      color: #facc15;
    }
    
    textarea {
      width: 100%;
      height: 120px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #0f172a;
      color: white;
      padding: 12px;
      outline: none;
      margin-bottom: 20px;
    }
    
    button {
      width: 100%;
      padding: 12px;
      background: #6d4aff;
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    
    button:hover {
      background: #5b3edd;
    }
  </style>

  <div class="review-page">
    <div class="review-card">
      <h1>Review {{ freelancer.name }}</h1>
      <p>Job: {{ job.title }}</p>

      <form method="POST">
        {% csrf_token %}

        <input type="hidden" name="rating" id="rating-value" />

        <div class="star-rating">
          <i onclick="rate(1)" class="fa fa-star"></i>
          <i onclick="rate(2)" class="fa fa-star"></i>
          <i onclick="rate(3)" class="fa fa-star"></i>
          <i onclick="rate(4)" class="fa fa-star"></i>
          <i onclick="rate(5)" class="fa fa-star"></i>
        </div>

        <textarea name="comment" placeholder="Write your review..."></textarea>

        <button type="submit">Submit Review</button>
      </form>
    </div>
  </div>

  <script>
    function rate(v) {
      document.getElementById('rating-value').value = v
    
      let stars = document.querySelectorAll('.star-rating i')
    
      stars.forEach((s, i) => {
        if (i < v) {
          s.classList.add('active')
        } else {
          s.classList.remove('active')
        }
      })
    }
  </script>
{% endblock %}
