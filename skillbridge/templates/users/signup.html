{% extends 'core/base.html' %}
{% load static %}

{% block title %}
  SkillBridge | Create Account
{% endblock %}

{% block extra_css %}
  <link rel="stylesheet" href="{% static 'css/user/signup.css' %}" />
{% endblock %}

{% block guest_content %}
  <h1>Signup</h1>
  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Signup</button>
  </form>
  <a href="{% url 'login' %}">Login</a>
{% endblock %}
